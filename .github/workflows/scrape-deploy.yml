name: Scrape & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # every day at 6am
  workflow_dispatch:        # manual trigger from GitHub UI

# Only one deploy at a time; never cancel an in-flight deploy
concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # ── Run scraper ────────────────────────────────────────────────────────────
      - name: Scrape
        working-directory: scraper
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            node scrape.js
          else
            node scrape.js --limit 0 --mat-limit 0
          fi

      - name: Commit scraper output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update scraped data [skip ci]"
          git push

      # ── Run ML predictions ─────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install lightgbm scikit-learn numpy pandas

      - name: Predict
        working-directory: scraper
        run: python predict.py --cache ./cache.json.gz --extra ../website/public/extra.json

      - name: Commit predictions
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: update predictions [skip ci]"
          git push

      # ── Build website ──────────────────────────────────────────────────────────
      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v4
        id: pages

      - name: Build
        working-directory: website
        env:
          # configure-pages gives us the correct base path (e.g. /moviedb/ or /)
          VITE_BASE: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      # ── Deploy to GitHub Pages ─────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4